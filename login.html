<div class="auth-container animate-fade-up">
  <div class="auth-card card">
    <div class="auth-header">
      <h1>تسجيل الدخول</h1>
      <p>أهلاً بكِ مجدداً في عالم الجمال</p>
    </div>

    <div *ngIf="errorMessage()" class="alert alert-danger mb-3">
      {{ errorMessage() }}
    </div>

    <form class="auth-form" (submit)="onSubmit(); $event.preventDefault()">
      <div class="form-group">
        <label>البريد الإلكتروني</label>
        <input type="email" [(ngModel)]="email" name="email" placeholder="example@mail.com" required>
      </div>
      <div class="form-group">
        <label>كلمة المرور</label>
        <input type="password" [(ngModel)]="password" name="password" placeholder="********" required>
      </div>
      
      <button class="btn btn-primary btn-full" [disabled]="isLoading()">
        {{ isLoading() ? 'جاري الدخول...' : 'دخول' }}
      </button>
      
      <div class="auth-footer mt-4">
        <p>ليس لديكِ حساب؟ <a routerLink="/auth/register">إنشاء حساب جديد</a></p>
      </div>
    </form>
  </div>
</div>
