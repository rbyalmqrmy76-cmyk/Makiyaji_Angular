<div class="auth-container animate-fade-up">
  <div class="auth-card card">
    <div class="auth-header">
      <h1>إنشاء حساب جديد</h1>
      <p>اكتشفي الجمال بلمسة واحدة.. انضمي إلينا!</p>
    </div>

    <div *ngIf="errorMessage()" class="alert alert-danger mb-3">
      {{ errorMessage() }}
    </div>

    <form class="auth-form" (submit)="onSubmit(); $event.preventDefault()">
      <div class="form-group">
        <label>الإسم الكامل</label>
        <input type="text" [(ngModel)]="fullName" name="fullName" placeholder="مثلاً: ربيع المقرمي" required>
      </div>
      <div class="form-group">
        <label>اسم المستخدم (Username)</label>
        <input type="text" [(ngModel)]="username" name="username" placeholder="مثلاً: rabee2026" required>
      </div>
      <div class="form-group">
        <label>البريد الإلكتروني</label>
        <input type="email" [(ngModel)]="email" name="email" placeholder="example@mail.com" required>
      </div>
      <div class="form-group">
        <label>كلمة المرور</label>
        <input type="password" [(ngModel)]="password" name="password" placeholder="********" required>
      </div>
      
      <button class="btn btn-primary btn-full" [disabled]="isLoading()">
        {{ isLoading() ? 'جاري إنشاء الحساب...' : 'حفظ وتسجيل الآن' }}
      </button>

      <div class="auth-footer mt-4">
        <p>لديكِ حساب بالفعل؟ <a routerLink="/auth/login">دخول</a></p>
      </div>
    </form>
  </div>
</div>
