<div class="breadcrumb-container">
  <div class="container breadcrumb-inner">
    <ol class="breadcrumb-list">
      <li class="breadcrumb-item">
        <a routerLink="/">الرئيسية</a>
        <span class="separator">/</span>
      </li>
      <li class="breadcrumb-item" *ngFor="let item of items(); let isLast = last">
        <a *ngIf="!isLast && item.url" [routerLink]="item.url">{{ item.label }}</a>
        <span *ngIf="isLast || !item.url" class="active-label">{{ item.label }}</span>
        <span *ngIf="!isLast" class="separator">/</span>
      </li>
    </ol>
  </div>
</div>
