<div class="dashboard-layout" [class.sidebar-closed]="!isSidebarOpen()">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <img src="assets/logo-mkiajy.png" alt="Mkiajy Admin Logo" class="admin-logo">
      <h3>لوحة التحكم المحترفة</h3>
    </div>

    <nav class="sidebar-nav">
      <a routerLink="/dashboard/summary" routerLinkActive="active" class="nav-item">
        <span class="icon">📊</span>
        <span>النظرة العامة</span>
      </a>
      <a routerLink="/dashboard/my-products" routerLinkActive="active" class="nav-item">
        <span class="icon">💄</span>
        <span>إدارة المنتجات</span>
      </a>
      <a routerLink="/dashboard/categories" routerLinkActive="active" class="nav-item">
        <span class="icon">🏷️</span>
        <span>إدارة الفئات</span>
      </a>
      <a routerLink="/dashboard/orders" routerLinkActive="active" class="nav-item">
        <span class="icon">📦</span>
        <span>إدارة الطلبات</span>
      </a>
      <a routerLink="/dashboard/coupons" routerLinkActive="active" class="nav-item">
        <span class="icon">🎟️</span>
        <span>أكواد الخصم</span>
      </a>
      <a routerLink="/dashboard/reports" routerLinkActive="active" class="nav-item">
        <span class="icon">📈</span>
        <span>تقارير المبيعات</span>
      </a>
      <a routerLink="/dashboard/users" routerLinkActive="active" class="nav-item">
        <span class="icon">👥</span>
        <span>فريق العمل</span>
      </a>
      <a routerLink="/dashboard/profile" routerLinkActive="active" class="nav-item">
        <span class="icon">⚙️</span>
        <span>إعدادات الحساب</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <button class="btn-logout" (click)="logout()">
        <span class="icon">🚪</span>
        <span>تسجيل الخروج</span>
      </button>
    </div>
  </aside>

  <!-- Content Area -->
  <main class="main-content">
    <header class="dashboard-header">
      <button class="toggle-btn" (click)="toggleSidebar()">☰</button>
      <div class="header-right">
        <div class="admin-info">
          <span>أهلاً، <strong>المدير ربيع</strong></span>
          <img src="https://ui-avatars.com/api/?name=Admin&background=E91E63&color=fff" alt="Admin Avatar" class="avatar">
        </div>
      </div>
    </header>

    <div class="content-wrapper">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
